{% extends "manage/base.html" %}
{% block title %}发送命令 - ClassIsland 集控{% endblock %}

{% block content %}
<div class="page-header">
    <h4><i class="bi bi-send"></i> 发送命令</h4>
    <p class="text-muted mb-0">向客户端发送远程命令</p>
</div>

<div class="row g-4">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><strong>向单个客户端发送</strong></div>
            <div class="card-body">
                <form id="sendForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">选择客户端</label>
                        <select name="client_id" class="form-select" required>
                            <option value="">-- 选择 --</option>
                            {% for c in clients %}
                            <option value="{{ c.id }}">
                                {{ c.client_uid|truncatechars:16 }}
                                {% if c.class_group %}({{ c.class_group.name }}){% endif %}
                                {% if c.is_online %}🟢{% else %}⚫{% endif %}
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">命令类型</label>
                        <select name="command_type" class="form-select" id="cmdType" required>
                            <option value="103">数据更新 (DataUpdated)</option>
                            <option value="101">重启应用 (RestartApp)</option>
                            <option value="102">发送通知 (SendNotification)</option>
                            <option value="104">获取配置 (GetClientConfig)</option>
                        </select>
                    </div>

                    <!-- 通知参数 -->
                    <div id="notifParams" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label">通知内容</label>
                            <input type="text" name="message_content" class="form-control" placeholder="通知消息文本">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">显示时长 (秒)</label>
                            <input type="number" name="duration_seconds" class="form-control" value="5" step="0.5">
                        </div>
                        <div class="form-check mb-2">
                            <input type="checkbox" name="is_emergency" class="form-check-input" id="isEmergency">
                            <label class="form-check-label" for="isEmergency">紧急通知</label>
                        </div>
                        <div class="form-check mb-2">
                            <input type="checkbox" name="is_topmost" class="form-check-input" id="isTopmost">
                            <label class="form-check-label" for="isTopmost">置顶</label>
                        </div>
                    </div>

                    <!-- 获取配置参数 -->
                    <div id="configParams" style="display:none;">
                        <div class="mb-3">
                            <label class="form-label">配置类型</label>
                            <select name="config_type" class="form-select">
                                <option value="1">应用设置 (AppSettings)</option>
                                <option value="2">档案 (Profile)</option>
                                <option value="3">当前组件</option>
                                <option value="4">工作流</option>
                                <option value="5">日志</option>
                                <option value="6">插件列表</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary"><i class="bi bi-send"></i> 发送</button>
                </form>
                <div id="sendResult" class="mt-3"></div>
            </div>
        </div>
    </div>

    <div class="col-md-6">
        <div class="card">
            <div class="card-header"><strong>广播命令</strong></div>
            <div class="card-body">
                <form id="broadcastForm">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">目标范围</label>
                        <select name="group_id" class="form-select">
                            <option value="">所有客户端</option>
                            {% for g in groups %}
                            <option value="{{ g.id }}">{{ g.name }} ({{ g.class_identity }})</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">命令类型</label>
                        <select name="command_type" class="form-select">
                            <option value="103">数据更新 (DataUpdated)</option>
                            <option value="101">重启应用 (RestartApp)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-warning"><i class="bi bi-broadcast"></i> 广播</button>
                </form>
                <div id="broadcastResult" class="mt-3"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
const cmdType = document.getElementById('cmdType');
cmdType.addEventListener('change', () => {
    document.getElementById('notifParams').style.display = cmdType.value === '102' ? '' : 'none';
    document.getElementById('configParams').style.display = cmdType.value === '104' ? '' : 'none';
});

document.getElementById('sendForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const form = new FormData(this);
    const data = {};
    form.forEach((v, k) => { if (k !== 'csrfmiddlewaretoken') data[k] = v; });
    const resp = await fetch('/manage/api/commands/send/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': form.get('csrfmiddlewaretoken'),
        },
        body: JSON.stringify(data),
    });
    const result = await resp.json();
    document.getElementById('sendResult').innerHTML =
        `<div class="alert alert-${resp.ok ? 'success' : 'danger'}">${result.message || result.error}</div>`;
});

document.getElementById('broadcastForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const form = new FormData(this);
    const data = {};
    form.forEach((v, k) => { if (k !== 'csrfmiddlewaretoken') data[k] = v; });
    const resp = await fetch('/manage/api/commands/broadcast/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': form.get('csrfmiddlewaretoken'),
        },
        body: JSON.stringify(data),
    });
    const result = await resp.json();
    document.getElementById('broadcastResult').innerHTML =
        `<div class="alert alert-${resp.ok ? 'success' : 'danger'}">${result.message || result.error}</div>`;
});
</script>
{% endblock %}
